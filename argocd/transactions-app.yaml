apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: transactions
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/bahasaki/eks-fintech-platform
    targetRevision: HEAD
    path: kubernetes/transactions
  destination:
    server: https://kubernetes.default.svc
    namespace: transactions
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true