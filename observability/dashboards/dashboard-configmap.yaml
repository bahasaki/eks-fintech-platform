apiVersion: v1
kind: ConfigMap
metadata:
  name: fintech-services-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  fintech-services-dashboard.json: |
    {
      "title": "Fintech Services Overview",
      "uid": "fintech-services-overview",
      "tags": ["fintech", "custom"],
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "panels": [
        {
          "id": 1,
          "title": "Request Rate (RPS) by service",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": { "drawStyle": "line", "fillOpacity": 10 }
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{namespace=~\"accounts|transactions|api-gateway\"}[5m])) by (namespace)",
              "legendFormat": "{{namespace}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 2,
          "title": "Error Rate (5xx %) by service",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "custom": { "drawStyle": "line", "fillOpacity": 10 },
              "max": 1,
              "min": 0
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{namespace=~\"accounts|transactions|api-gateway\", status=~\"5..\"}[5m])) by (namespace)\n/\nsum(rate(http_requests_total{namespace=~\"accounts|transactions|api-gateway\"}[5m])) by (namespace)",
              "legendFormat": "{{namespace}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "title": "Latency p50 / p95 / p99 by service",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": { "drawStyle": "line", "fillOpacity": 5 }
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum(rate(http_request_duration_seconds_bucket{namespace=~\"accounts|transactions|api-gateway\"}[5m])) by (le, namespace))",
              "legendFormat": "{{namespace}} p50",
              "refId": "A"
            },
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{namespace=~\"accounts|transactions|api-gateway\"}[5m])) by (le, namespace))",
              "legendFormat": "{{namespace}} p95",
              "refId": "B"
            },
            {
              "expr": "histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{namespace=~\"accounts|transactions|api-gateway\"}[5m])) by (le, namespace))",
              "legendFormat": "{{namespace}} p99",
              "refId": "C"
            }
          ]
        }
      ],
      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "query": "prometheus",
            "current": {}
          }
        ]
      }
    }
