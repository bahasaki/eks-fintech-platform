apiVersion: v1
kind: ServiceAccount
metadata:
  name: transactions-sa
  namespace: transactions
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: transactions-role
  namespace: transactions
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: transactions-rolebinding
  namespace: transactions
subjects:
  - kind: ServiceAccount
    name: transactions-sa
    namespace: transactions
roleRef:
  kind: Role
  name: transactions-role
  apiGroup: rbac.authorization.k8s.io